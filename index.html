<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für dich ❤️</title>

<style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        font-family:Arial, sans-serif;
        background: linear-gradient(135deg,#ff9a9e,#fad0c4);
        color:white;
        overflow-y:auto;

        display:flex;
        justify-content:center;
        align-items:flex-start;

        min-height:100vh;
        padding:30px 15px;
    }

    .card{
        width:100%;
        max-width:420px;

        background:rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);

        border-radius:25px;
        padding:20px;

        text-align:center;

        box-shadow:0 8px 30px rgba(0,0,0,0.25);

        animation:fadeIn 1.2s ease;

        position:relative;
    }

    img{
        width:100%;
        max-width:260px;
        border-radius:20px;
        margin-bottom:20px;

        box-shadow:0 5px 20px rgba(0,0,0,0.3);
    }

    h1{
        font-size:1.5em;
        margin-bottom:15px;
        white-space:nowrap;
    }

    p{
        font-size:1.1em;
        line-height:1.6;
        margin-bottom:15px;
    }

    .voucher{
        margin-top:20px;
        font-size:1.4em;
        font-weight:bold;
        color:#fff3a3;
        background:rgba(255,255,255,0.12);
        padding:15px;
        border-radius:15px;
    }

    .button-area{
        margin-top:25px;
        height:80px;
        position:relative;
    }

    #funButton{
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        padding:14px 24px;
        border:none;
        border-radius:15px;
        font-size:1em;
        font-weight:bold;
        background:white;
        color:#ff5f8f;
        cursor:pointer;
        transition:0.25s;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    #funButton:hover{
        transform:translateX(-50%) scale(1.05);
    }

    .love{
        margin-top:10px;
        font-size:1.2em;
    }

</style>
</head>

<script>

const button = document.getElementById("funButton");

button.addEventListener("click", () => {

    const area = document.querySelector(".button-area");

    const maxX = area.clientWidth - button.clientWidth;
    const maxY = area.clientHeight - button.clientHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    button.style.left = randomX + "px";
    button.style.top = randomY + "px";

    button.style.transform = "none";
});
